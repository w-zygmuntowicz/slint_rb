require:
  - rubocop-minitest
  - rubocop-rake

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Minitest/MultipleAssertions:
  Enabled: false

Minitest/EmptyLineBeforeAssertionMethods:
  Enabled: false